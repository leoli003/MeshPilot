        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        .bg-pattern::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-pattern-colors);
            animation: bgPulse 20s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Noise texture overlay */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1600px;
            margin: 0 auto;
            padding: 1rem 2rem;
        }

        /* Header - 隐藏顶部的空header */
        header {
            display: none;
        }

        .header-badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 100px;
            margin-bottom: 1.5rem;
            animation: badgeGlow 3s ease-in-out infinite;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 1rem;
            background: var(--header-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 8s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 2.5rem;
            flex-wrap: wrap;
        }

        .stats-bar-bottom {
            margin: 3rem 0 2rem;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
        }

        /* 底部标题区 */
        .header-bottom {
            text-align: center;
            padding: 2rem 0;
            margin-bottom: 1rem;
        }

        .header-bottom .header-badge {
            display: inline-block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 100px;
            margin-bottom: 1rem;
        }

        .header-bottom h1 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            background: var(--header-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-bottom .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            border-color: var(--accent-cyan);
            transform: translateY(-2px);
            box-shadow: var(--glow-cyan);
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 600;
            color: var(--accent-cyan);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Filter section */
        .filter-section {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 0.5rem 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            padding: 0.6rem 1.2rem;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .filter-btn.active {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .filter-btn[data-filter="agent"] { --btn-accent: var(--accent-cyan); }
        .filter-btn[data-filter="command"] { --btn-accent: var(--accent-magenta); }
        .filter-btn[data-filter="skill"] { --btn-accent: var(--accent-green); }

        .filter-btn.active[data-filter="agent"] {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }
        .filter-btn.active[data-filter="command"] {
            background: rgba(255, 0, 128, 0.15);
            border-color: var(--accent-magenta);
            color: var(--accent-magenta);
        }
        .filter-btn.active[data-filter="skill"] {
            background: rgba(0, 255, 136, 0.15);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        /* Source filter */
        .source-filter {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin: 0.5rem 0 1rem;
            flex-wrap: wrap;
        }

        .source-btn {
            font-size: 0.75rem;
            padding: 0.4rem 0.8rem;
            background: transparent;
            border: 1px solid var(--border-accent);
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;

        td {

            margin: 0.5rem 0;

        }

        .theme-label {

        }

        .theme-btn {
            width: 32px;
            height: 32px;

            position: relative;

        }

        .theme-btn.active {

        }

            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;

        // Populate source filter
        const sourceFilter = document.getElementById('sourceFilter');
        sources.forEach(source => {
            const btn = document.createElement('button');
            btn.className = 'source-btn';
            btn.textContent = source;
            btn.dataset.source = source;
            sourceFilter.appendChild(btn);
        });

        // Render table
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.dataset.type = item.type;
                tr.dataset.source = item.source;

                const typeIcon = item.type === 'agent' ? '🤖' : item.type === 'command' ? '⚡' : '✨';

                tr.innerHTML = `
                    <td><span class="row-num">${index + 1}</span></td>
                    <td><span class="type-badge ${item.type}">${typeIcon} ${item.type.toUpperCase()}</span></td>
                    <td><span class="category">${item.category}</span></td>
                    <td><span class="subcategory">${item.subcategory}</span></td>
                    <td><span class="source-badge">${item.source}</span></td>
                    <td><span class="command-code">${item.command}</span></td>
                    <td><span class="example-code" title="${item.example}">${item.example}</span></td>
                    <td><span class="description">${item.description}</span></td>
                `;

                tbody.appendChild(tr);
            });

            updateStats(data);
        }

        // Update statistics
        function updateStats(data) {
            document.getElementById('total-count').textContent = data.length;
            document.getElementById('agent-count').textContent = data.filter(i => i.type === 'agent').length;
            document.getElementById('command-count').textContent = data.filter(i => i.type === 'command').length;
            document.getElementById('skill-count').textContent = data.filter(i => i.type === 'skill').length;
        }

        // Filter functionality
        let activeTypeFilter = 'all';
        let activeSourceFilter = null;
        let searchQuery = '';

        function applyFilters() {
            const rows = document.querySelectorAll('#tableBody tr');

            rows.forEach(row => {
                const type = row.dataset.type;
                const source = row.dataset.source;
                const text = row.textContent.toLowerCase();

                const typeMatch = activeTypeFilter === 'all' || type === activeTypeFilter;
                const sourceMatch = !activeSourceFilter || source === activeSourceFilter;
                const searchMatch = !searchQuery || text.includes(searchQuery.toLowerCase());

                row.classList.toggle('hidden', !(typeMatch && sourceMatch && searchMatch));
            });

            // Update visible count
            const visibleRows = document.querySelectorAll('#tableBody tr:not(.hidden)');
            document.getElementById('total-count').textContent = visibleRows.length;
            document.getElementById('agent-count').textContent = [...visibleRows].filter(r => r.dataset.type === 'agent').length;
            document.getElementById('command-count').textContent = [...visibleRows].filter(r => r.dataset.type === 'command').length;
            document.getElementById('skill-count').textContent = [...visibleRows].filter(r => r.dataset.type === 'skill').length;
        }

        // Type filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeTypeFilter = btn.dataset.filter;
                applyFilters();
            });
        });

        // Source filter buttons
        sourceFilter.addEventListener('click', (e) => {
            if (e.target.classList.contains('source-btn')) {
                const wasActive = e.target.classList.contains('active');
                document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));

                if (!wasActive) {
                    e.target.classList.add('active');
                    activeSourceFilter = e.target.dataset.source;
                } else {
                    activeSourceFilter = null;
                }
                applyFilters();
            }
        });

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            applyFilters();
        });

        // Initial render
        renderTable(allData);

        // ==================== 主题切换功能 ====================
        const themeBtns = document.querySelectorAll('.theme-btn');

        themeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 更新按钮状态
                themeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // 应用主题
                const theme = btn.dataset.theme;
                if (theme === 'cyber-neon') {
                    document.documentElement.removeAttribute('data-theme');
                } else {
                    document.documentElement.setAttribute('data-theme', theme);
                }

                // 保存主题到本地存储
                localStorage.setItem('claude-ecosystem-theme', theme);
            });
        });

        // 从本地存储恢复主题
        const savedTheme = localStorage.getItem('claude-ecosystem-theme');
        if (savedTheme) {
            const savedBtn = document.querySelector(`.theme-btn[data-theme="${savedTheme}"]`);
            if (savedBtn) {
                savedBtn.click();
            }
        }

        // Add animation on scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.stat-item').forEach(item => {
            item.style.opacity = '0';
            item.style.transform = 'translateY(20px)';
            item.style.transition = 'all 0.6s ease';
            observer.observe(item);
        });
    </script>
</body>
</html>
